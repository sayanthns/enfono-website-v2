version: '3.8'
services:
  enfono-website:
    build: .
    container_name: enfono-website-v2
    restart: unless-stopped
    ports:
      - "3005:80"
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost" ]
      interval: 30s
      timeout: 10s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
